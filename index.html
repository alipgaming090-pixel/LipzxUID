<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIPZX STORE</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 28px;
  font-weight: bold;
}

.container {
  padding: 15px;
}

.card {
  background: #1e293b;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}

.id { font-size: 18px; font-weight: bold; }
.harga { color: #38bdf8; margin-top: 5px; }

.btn {
  display: block;
  text-align: center;
  padding: 10px;
  border-radius: 8px;
  margin-top: 10px;
  text-decoration: none;
  font-weight: bold;
}

.beli { background: #22c55e; }
.konfirmasi { background: #f59e0b; }

.qr {
  text-align: center;
  margin-top: 30px;
}

.qr img {
  width: 220px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>LIPZX STORE</header>

<div class="container">

<!-- PRODUK -->
<div class="card">
  <div class="id">ID: 123456</div>
  <div class="harga">Rp50.000</div>
  <a class="btn beli" href="#qr">Beli Sekarang</a>
</div>

<div class="card">
  <div class="id">ID: 777777</div>
  <div class="harga">Rp150.000</div>
  <a class="btn beli" href="#qr">Beli Sekarang</a>
</div>

<div class="card">
  <div class="id">ID: 999999</div>
  <div class="harga">Rp300.000</div>
  <a class="btn beli" href="#qr">Beli Sekarang</a>
</div>

<!-- QR + 1 KONFIRMASI -->
<div class="qr" id="qr">
  <h2>Pembayaran QRIS</h2>
  <img src="qr.png">
  <p>Scan QR lalu klik tombol di bawah</p>

  <a class="btn konfirmasi"
  href="https://wa.me/6283822416101?text=Saya%20sudah%20bayar%2C%20ini%20bukti%20transfer">
  Konfirmasi Pembayaran
  </a>
</div>

</div>

</body>
</html>
